name: snapcard
description: "Scan a business card, get a contact — on-device AI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_gemma: ^0.16.4
  camera: ^0.12.0+1
  image_picker: ^1.2.2
  flutter_contacts: ^2.2.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  device_info_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
